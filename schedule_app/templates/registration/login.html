{% extends 'schedule_app/base.html' %}

{% block title %}Вход в систему - Расписание МРК{% endblock %}

{% block content %}
<div class="row justify-content-center mt-3 mt-md-5">
    <div class="col-12 col-sm-10 col-md-8 col-lg-4">
        <div class="card shadow">
            <div class="card-header bg-primary text-white text-center py-3">
                <h4 class="mb-0">Авторизация</h4>
            </div>
            <div class="card-body p-3 p-md-4">
                {% if form.errors %}
                <div class="alert alert-danger py-2 small">
                    Неверное имя пользователя или пароль.
                </div>
                {% endif %}
                
                <form method="post" action="{% url 'login' %}">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="id_username" class="form-label small fw-bold">Имя пользователя</label>
                        <input type="text" name="username" id="id_username" class="form-control" required autofocus>
                    </div>
                    <div class="mb-3">
                        <label for="id_password" class="form-label small fw-bold">Пароль</label>
                        <input type="password" name="password" id="id_password" class="form-control" required>
                    </div>
                    <div class="d-grid gap-2 mt-4">
                        <button type="submit" class="btn btn-primary py-2">Войти</button>
                    </div>
                </form>
            </div>
        </div>
        <div class="text-center mt-3">
            <a href="{% url 'public_schedule' %}" class="text-decoration-none text-muted small">← Вернуться к просмотру</a>
        </div>
    </div>
</div>
{% endblock %}
